name: Recherche SIRENs

on:
  workflow_dispatch:

jobs:
  recherche:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests openpyxl
      - run: python recherche_siren.py
        env:
          INSEE_KEY: ${{ secrets.INSEE_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: sirens-entreprises
          path: sirens_entreprises.xlsx
