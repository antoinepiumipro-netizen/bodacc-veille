name: Prospection M&A Pappers

on:
  workflow_dispatch:   # Lancement manuel uniquement

jobs:
  prospection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests openpyxl
      - run: python pappers_prospection.py
        env:
          PAPPERS_KEY: ${{ secrets.PAPPERS_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: prospection-MA
          path: prospection_MA_IDF.xlsx
