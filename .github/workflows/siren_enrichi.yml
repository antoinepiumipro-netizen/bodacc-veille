name: SIREN Enrichi

on:
  workflow_dispatch:

jobs:
  enrichissement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests openpyxl
      - run: python siren_enrichi_test.py
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: siren-enrichi-test
          path: siren_enrichi_test.xlsx
