name: Recherche SIRENs GIFAS

on:
  workflow_dispatch:

jobs:
  recherche:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests openpyxl
      - run: python sirens_gifas.py
      - uses: actions/upload-artifact@v4
        with:
          name: sirens-gifas
          path: sirens_gifas.xlsx
